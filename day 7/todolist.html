<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface-2: #f7f8fa;
            --border: #e8eaed;
            --text: #1a1d23;
            --text-2: #6b7280;
            --text-3: #b0b7c3;
            --accent: #5b6af0;
            --accent-light: #eef0ff;
            --danger: #ef4444;
            --danger-light: #fff1f1;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 20px 80px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        /* Header */
        .header {
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(-12px);
            animation: fadeUp 0.5s ease forwards;
        }

        .header-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .header-sub {
            margin-top: 6px;
            font-size: 13px;
            color: var(--text-3);
            font-weight: 300;
        }

        /* Input */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            opacity: 0;
            transform: translateY(-8px);
            animation: fadeUp 0.5s 0.1s ease forwards;
        }

        .input-wrap {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 400;
            color: var(--text);
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]::placeholder {
            color: var(--text-3);
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(91,106,240,0.10), var(--shadow-sm);
        }

        .add-btn {
            padding: 14px 22px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(91,106,240,0.30);
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: #4a58e0;
            box-shadow: 0 4px 16px rgba(91,106,240,0.40);
            transform: translateY(-1px);
        }

        .add-btn:active {
            transform: scale(0.96) translateY(0);
            box-shadow: 0 1px 6px rgba(91,106,240,0.20);
        }

        /* Stats bar */
        .stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 12px;
            color: var(--text-3);
            font-weight: 400;
            opacity: 0;
            animation: fadeUp 0.5s 0.15s ease forwards;
        }

        .stat span { color: var(--text-2); font-weight: 500; }

        /* List */
        #list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s, transform 0.2s;
            animation: slideIn 0.28s cubic-bezier(0.34, 1.3, 0.64, 1);
        }

        .task-item:hover {
            border-color: #dde0e8;
            box-shadow: var(--shadow-md);
        }

        .task-item.done {
            background: var(--surface-2);
            border-color: var(--border);
        }

        /* Checkbox */
        .check-btn {
            width: 20px;
            height: 20px;
            min-width: 20px;
            border-radius: 6px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .check-btn:hover { border-color: var(--accent); transform: scale(1.08); }

        .check-btn.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .check-btn svg { display: none; }
        .check-btn.checked svg { display: block; }

        /* Task text */
        .task-text {
            flex: 1;
            font-size: 14px;
            color: var(--text);
            font-weight: 400;
            line-height: 1.4;
            cursor: pointer;
            transition: color 0.2s;
            word-break: break-word;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: var(--text-3);
        }

        /* Delete button */
        .del-btn {
            opacity: 0;
            padding: 5px 8px;
            background: none;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            color: var(--text-3);
            font-size: 12px;
            font-family: 'Sora', sans-serif;
            font-weight: 500;
            transition: opacity 0.2s, color 0.2s, background 0.2s;
        }

        .task-item:hover .del-btn { opacity: 1; }

        .del-btn:hover {
            color: var(--danger);
            background: var(--danger-light);
        }

        /* Empty state */
        #emptyState {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-3);
            opacity: 0;
            animation: fadeUp 0.5s 0.2s ease forwards;
        }

        .empty-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
            opacity: 0.4;
        }

        #emptyState p {
            font-size: 13px;
            font-weight: 300;
        }

        /* Animations */
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <p class="header-label">Workspace</p>
            <h1>My Tasks</h1>
            <p class="header-sub">Stay focused, one task at a time.</p>
        </div>

        <div class="input-row">
            <input type="text" id="taskInput" placeholder="Add a new task…" autocomplete="off" />
            <button class="add-btn" id="addTask">Add</button>
        </div>

        <div class="stats" id="stats"></div>

        <ul id="list"></ul>

        <div id="emptyState">
            <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            <p>No tasks yet — add one above</p>
        </div>
    </div>

    <script>
        const listEl  = document.getElementById("list");
        const addBtn  = document.getElementById("addTask");
        const input   = document.getElementById("taskInput");
        const emptyEl = document.getElementById("emptyState");
        const statsEl = document.getElementById("stats");
        let tasks = [];

        function saveTasks() {
            localStorage.setItem("tasks_v2", JSON.stringify(tasks));
        }

        function updateUI() {
            const total = tasks.length;
            const done  = tasks.filter(t => t.done).length;
            emptyEl.style.display = total === 0 ? "block" : "none";
            statsEl.style.display = total === 0 ? "none" : "flex";
            if (total > 0) {
                statsEl.innerHTML = `<div><span>${total}</span> task${total !== 1 ? "s" : ""}</div><div><span>${done}</span> completed</div>`;
            }
        }

        function createItem(task) {
            const li    = document.createElement("li");
            li.className = "task-item" + (task.done ? " done" : "");
            li.dataset.id = task.id;

            const check = document.createElement("button");
            check.className = "check-btn" + (task.done ? " checked" : "");
            check.innerHTML = `<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

            const span = document.createElement("span");
            span.className = "task-text";
            span.textContent = task.text;

            const del = document.createElement("button");
            del.className = "del-btn";
            del.textContent = "Delete";

            check.addEventListener("click", () => toggleDone(task.id, li, check, span));
            span.addEventListener("click",  () => toggleDone(task.id, li, check, span));

            del.addEventListener("click", () => {
                li.style.opacity   = "0";
                li.style.transform = "translateX(10px) scale(0.97)";
                setTimeout(() => {
                    tasks = tasks.filter(t => t.id !== task.id);
                    li.remove();
                    saveTasks();
                    updateUI();
                }, 220);
            });

            li.append(check, span, del);
            return li;
        }

        function toggleDone(id, li, check, span) {
            const t = tasks.find(t => t.id === id);
            if (!t) return;
            t.done = !t.done;
            check.classList.toggle("checked", t.done);
            li.classList.toggle("done", t.done);
            saveTasks();
            updateUI();
        }

        function addTask() {
            const text = input.value.trim();
            if (!text) return;
            const task = { id: Date.now(), text, done: false };
            tasks.push(task);
            listEl.appendChild(createItem(task));
            saveTasks();
            updateUI();
            input.value = "";
            input.focus();
        }

        // Load
        try {
            const saved = localStorage.getItem("tasks_v2");
            if (saved) tasks = JSON.parse(saved);
        } catch(e) { tasks = []; }
        tasks.forEach(t => listEl.appendChild(createItem(t)));
        updateUI();

        addBtn.addEventListener("click", addTask);
        input.addEventListener("keydown", e => { if (e.key === "Enter") addTask(); });
    </script>
</body>
</html>
